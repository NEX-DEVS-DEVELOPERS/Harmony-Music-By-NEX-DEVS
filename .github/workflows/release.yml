name: Build Android and Windows
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        # Note: Production releases should be signed.
        # Configure signingConfigs in android/app/build.gradle and provide secrets for a fully production-ready build.
        run: flutter build apk --release

      - name: Build App Bundle
        # Note: Production releases should be signed.
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: |
          flutter clean
          flutter build windows --release

      - name: Package Windows (Zip)
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\harmony_music_windows.zip

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build\windows\harmony_music_windows.zip
